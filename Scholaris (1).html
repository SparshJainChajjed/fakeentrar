<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scholaris — Learning Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--g50:#eaf3de;--g100:#c0dd97;--g200:#97c459;--g400:#639922;--g600:#3b6d11;--g800:#27500a;--g900:#173404;
--t50:#e1f5ee;--t200:#5dcaa5;--t400:#1d9e75;--t600:#0f6e56;
--b50:#e6f1fb;--b200:#85b7eb;--b400:#378add;--b600:#185fa5;--b800:#0c447c;
--a50:#faeeda;--a200:#ef9f27;--a400:#ba7517;--a600:#854f0b;
--c50:#faece7;--c200:#f0997b;--c400:#d85a30;--c600:#993c1d;
--p50:#eeedfe;--p200:#afa9ec;--p400:#7f77dd;--p600:#534ab7;--p800:#3c3489;
--r50:#fcebeb;--r400:#e24b4a;--r600:#a32d2d;
--gr50:#f1efe8;--gr100:#d3d1c7;--gr200:#b4b2a9;--gr400:#888780;--gr500:#737370;--gr600:#5f5e5a;--gr700:#4f4e4a;--gr800:#444441;--gr900:#2c2c2a;
--sw:260px;--th:64px;
}
html,body{height:100%;font-family:'Sora',sans-serif;background:#f5f4f0;color:var(--gr900);overflow-x:hidden}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideLeft{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes notifPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes sideSlide{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastIn{from{transform:translateY(20px) scale(0.95);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
@keyframes toastOut{to{transform:translateY(20px) scale(0.95);opacity:0}}
@keyframes floatBadge{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.anim-fade-up{animation:fadeUp 0.45s cubic-bezier(0.16,1,0.3,1) both}
.anim-fade-up-1{animation:fadeUp 0.45s 0.06s cubic-bezier(0.16,1,0.3,1) both}
.anim-fade-up-2{animation:fadeUp 0.45s 0.12s cubic-bezier(0.16,1,0.3,1) both}
.anim-fade-up-3{animation:fadeUp 0.45s 0.18s cubic-bezier(0.16,1,0.3,1) both}
.anim-fade-up-4{animation:fadeUp 0.45s 0.24s cubic-bezier(0.16,1,0.3,1) both}
.anim-pop{animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both}

/* ══ LOGIN ══ */
#login{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f2a07 0%,#1a4a0d 40%,#0d3b2a 100%);
  background-size:300% 300%;animation:gradientShift 8s ease infinite;
  padding:2rem;position:relative;overflow:hidden;
}
#login::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 30% 50%, rgba(99,153,34,0.15) 0%, transparent 70%),
            radial-gradient(ellipse 40% 60% at 80% 20%, rgba(29,158,117,0.1) 0%, transparent 60%);
}
.login-dots{position:absolute;inset:0;pointer-events:none}
.login-dot{position:absolute;border-radius:50%;background:rgba(255,255,255,0.04)}
.lcard{
  position:relative;z-index:2;
  background:rgba(255,255,255,0.97);border-radius:24px;
  width:100%;max-width:460px;padding:2.8rem;
  box-shadow:0 32px 80px rgba(0,0,0,0.4);
  animation:popIn 0.6s cubic-bezier(0.34,1.2,0.64,1);
}
.llogo{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
.lbadge{
  width:50px;height:50px;border-radius:14px;
  background:linear-gradient(135deg,var(--g400),var(--t400));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(99,153,34,0.4);
  animation:floatBadge 3s ease-in-out infinite;
}
.lbadge svg{width:26px;height:26px;stroke:white;stroke-width:2;fill:none}
.lschool{font-family:'Fraunces',serif;font-size:19px;font-weight:700;color:var(--g800);line-height:1.1}
.ltag{font-size:11px;color:var(--gr400);letter-spacing:0.07em;text-transform:uppercase}
.lcard h2{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--gr900);margin-bottom:4px}
.lsub{font-size:14px;color:var(--gr400);margin-bottom:1.8rem}
.role-tabs{display:flex;gap:6px;background:var(--gr50);border-radius:12px;padding:5px;margin-bottom:1.6rem}
.rtab{flex:1;padding:9px 6px;border:none;border-radius:8px;background:transparent;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;color:var(--gr400);cursor:pointer;transition:all 0.2s;letter-spacing:0.02em}
.rtab.active{background:white;color:var(--g800);box-shadow:0 2px 8px rgba(0,0,0,0.1);transform:scale(1.02)}
.fg{margin-bottom:1.2rem}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--gr600);margin-bottom:6px;letter-spacing:0.03em;text-transform:uppercase}
.fg input{width:100%;padding:12px 16px;border:2px solid var(--gr100);border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;color:var(--gr900);outline:none;transition:all 0.2s;background:#fafafa}
.fg input:focus{border-color:var(--g400);background:white;box-shadow:0 0 0 4px rgba(99,153,34,0.08)}
.fhint{font-size:11px;color:var(--gr400);margin-top:5px}
.lbtn{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--g600),var(--t600));
  color:white;font-family:'Sora',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all 0.2s;letter-spacing:0.02em;
  box-shadow:0 4px 20px rgba(59,109,17,0.3);position:relative;overflow:hidden;
}
.lbtn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background 0.2s}
.lbtn:hover::after{background:rgba(255,255,255,0.1)}
.lbtn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(59,109,17,0.4)}
.lbtn:active{transform:scale(0.98)}

/* ══ APP SHELL ══ */
#app{display:none;min-height:100vh}
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:var(--sw);
  z-index:100;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;
  animation:sideSlide 0.4s cubic-bezier(0.16,1,0.3,1);
}
/* Role-specific sidebar colors */
.role-student .sidebar{background:linear-gradient(180deg,var(--g900) 0%,#0d2d05 100%)}
.role-teacher .sidebar{background:linear-gradient(180deg,var(--b800) 0%,#021d35 100%)}
.role-admin .sidebar{background:linear-gradient(180deg,#2c1060 0%,#1a0840 100%)}
.role-parent .sidebar{background:linear-gradient(180deg,var(--t600) 0%,#062820 100%)}

.sbrand{padding:20px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sbrand-row{display:flex;align-items:center;gap:10px}
.slogo{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.role-student .slogo{background:var(--g400)}
.role-teacher .slogo{background:var(--b400)}
.role-admin .slogo{background:var(--p400)}
.role-parent .slogo{background:var(--t400)}
.slogo svg{width:20px;height:20px;stroke:white;stroke-width:2;fill:none}
.sschool{font-family:'Fraunces',serif;font-size:14px;font-weight:700;color:white;line-height:1.2}
.stag2{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.06em;text-transform:uppercase}
.suinfo{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.suavatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;transition:transform 0.2s}
.suavatar:hover{transform:scale(1.08)}
.role-student .suavatar{background:var(--g400)}
.role-teacher .suavatar{background:var(--b400)}
.role-admin .suavatar{background:var(--p400)}
.role-parent .suavatar{background:var(--t400)}
.suname{font-size:13px;font-weight:600;color:white}
.surole{font-size:11px;padding:2px 7px;border-radius:5px;display:inline-block;margin-top:2px}
.role-student .surole{background:rgba(99,153,34,0.2);color:var(--g100)}
.role-teacher .surole{background:rgba(55,138,221,0.2);color:#b5d4f4}
.role-admin .surole{background:rgba(127,119,221,0.2);color:var(--p200)}
.role-parent .surole{background:rgba(29,158,117,0.2);color:var(--t200)}
.snav{flex:1;padding:10px 0}
.snlabel{font-size:10px;font-weight:700;color:rgba(255,255,255,0.28);letter-spacing:0.1em;text-transform:uppercase;padding:8px 20px 4px}
.sni{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:all 0.18s;border-left:3px solid transparent;color:rgba(255,255,255,0.55);font-size:13px;font-weight:500}
.sni:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.9)}
.sni.active{border-left-color:rgba(255,255,255,0.5);color:white;background:rgba(255,255,255,0.1)}
.sni svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.snbadge{margin-left:auto;color:white;border-radius:10px;font-size:11px;font-weight:700;padding:1px 7px;min-width:20px;text-align:center}
.role-student .snbadge{background:var(--c400)}
.role-teacher .snbadge{background:var(--c400)}
.role-admin .snbadge{background:var(--c400)}
.role-parent .snbadge{background:var(--c400)}
.slogout{display:flex;align-items:center;gap:8px;padding:10px 20px;margin:8px 12px 20px;border:none;border-radius:8px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);font-family:'Sora',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;width:calc(100% - 24px)}
.slogout:hover{background:rgba(220,60,60,0.15);color:#f08080}
.slogout svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* ══ TOPBAR ══ */
.topbar{
  position:fixed;left:var(--sw);right:0;top:0;height:var(--th);
  background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.06);z-index:90;
  display:flex;align-items:center;padding:0 28px;gap:16px;
  animation:fadeIn 0.4s 0.2s both;
}
.tbtitle{font-family:'Fraunces',serif;font-size:21px;font-weight:700;color:var(--gr900);flex:1;transition:all 0.3s}
.tbactions{display:flex;align-items:center;gap:8px}
.ibtn{width:36px;height:36px;border-radius:9px;border:1.5px solid var(--gr100);background:white;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.18s;position:relative}
.ibtn:hover{border-color:currentColor;transform:scale(1.05)}
.ibtn svg{width:15px;height:15px;stroke:var(--gr600);fill:none;stroke-width:2}
.ndot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;border:1.5px solid white;animation:notifPop 0.4s 1s both}
.role-student .ndot{background:var(--c400)}
.role-teacher .ndot{background:var(--c400)}
.tbavatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;cursor:pointer;transition:transform 0.2s}
.tbavatar:hover{transform:scale(1.1)}
.role-student .tbavatar{background:linear-gradient(135deg,var(--g400),var(--t400))}
.role-teacher .tbavatar{background:linear-gradient(135deg,var(--b400),var(--p400))}
.role-admin .tbavatar{background:linear-gradient(135deg,var(--p400),var(--c400))}
.role-parent .tbavatar{background:linear-gradient(135deg,var(--t400),var(--b400))}

/* ══ MAIN CONTENT ══ */
.main{margin-left:var(--sw);margin-top:var(--th);padding:28px 32px;min-height:calc(100vh - var(--th))}
.pg{display:none}
.pg.active{display:block;animation:fadeUp 0.4s cubic-bezier(0.16,1,0.3,1)}

/* ══ COMMON COMPONENTS ══ */
.pghdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.pghdr h2{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--gr900)}
.pghdr p{font-size:13px;color:var(--gr400);margin-top:2px}
.btn{padding:9px 18px;border:none;border-radius:9px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.18s;display:inline-flex;align-items:center;gap:6px}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:scale(0.97)}
.btn-g{background:var(--g600);color:white;box-shadow:0 2px 10px rgba(59,109,17,0.25)}
.btn-g:hover{background:var(--g800);box-shadow:0 4px 18px rgba(59,109,17,0.35)}
.btn-b{background:var(--b600);color:white;box-shadow:0 2px 10px rgba(24,95,165,0.25)}
.btn-b:hover{background:var(--b800)}
.btn-p{background:var(--p600);color:white;box-shadow:0 2px 10px rgba(83,74,183,0.25)}
.btn-p:hover{background:var(--p800)}
.btn-c{background:var(--c600);color:white;box-shadow:0 2px 10px rgba(153,60,29,0.2)}
.btn-t{background:var(--t600);color:white;box-shadow:0 2px 10px rgba(15,110,86,0.25)}
.btn-ghost{background:white;color:var(--gr800);border:1.5px solid var(--gr100)}
.btn-ghost:hover{border-color:var(--gr400)}

.card{background:white;border-radius:16px;border:1px solid rgba(0,0,0,0.06);overflow:hidden;transition:box-shadow 0.2s,transform 0.2s}
.card:hover{box-shadow:0 4px 24px rgba(0,0,0,0.07)}
.chdr{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gr50)}
.chdr h4{font-size:14px;font-weight:600;color:var(--gr800)}
.cbody{padding:0}
.clink{font-size:12px;color:var(--g400);cursor:pointer;font-weight:600;transition:color 0.15s}
.clink:hover{color:var(--g600)}

.stats-row{display:grid;gap:14px;margin-bottom:24px}
.stat-card{background:white;border-radius:14px;padding:18px 20px;border:1px solid rgba(0,0,0,0.06);display:flex;flex-direction:column;gap:6px;transition:transform 0.2s,box-shadow 0.2s;cursor:default}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.1)}
.stat-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.stat-icon svg{width:20px;height:20px;stroke:white;fill:none;stroke-width:2}
.stat-num{font-size:30px;font-weight:700;color:var(--gr900);line-height:1;font-family:'Fraunces',serif}
.stat-lbl{font-size:12px;color:var(--gr400);font-weight:500}
.stat-chg{font-size:12px;font-weight:600}

/* Tiles */
.tiles{display:grid;gap:12px}
.tile{background:white;border-radius:14px;border:1px solid rgba(0,0,0,0.06);padding:22px 18px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all 0.22s;text-align:center;position:relative;overflow:hidden}
.tile::before{content:'';position:absolute;inset:0;background:transparent;transition:background 0.2s}
.tile:hover::before{background:rgba(0,0,0,0.015)}
.tile:hover{box-shadow:0 8px 28px rgba(0,0,0,0.1);transform:translateY(-3px);border-color:rgba(0,0,0,0.1)}
.tile:active{transform:scale(0.97)}
.ticon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.ticon svg{width:26px;height:26px;stroke-width:1.8;fill:none}
.tname{font-size:13px;font-weight:600;color:var(--gr800)}

/* Table */
.tbl-wrap{background:white;border-radius:14px;border:1px solid rgba(0,0,0,0.06);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--gr400);background:var(--gr50);border-bottom:1px solid var(--gr100)}
tbody td{padding:12px 16px;border-bottom:1px solid rgba(0,0,0,0.04);color:var(--gr800);transition:background 0.15s}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--gr50)}
.gbadge{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700}
.gbadge.ap{background:var(--g50);color:var(--g800)} .gbadge.aplus{background:var(--t50);color:var(--t600)}
.gbadge.bplus{background:var(--b50);color:var(--b600)} .gbadge.b{background:var(--p50);color:var(--p600)}
.gbadge.c{background:var(--a50);color:var(--a600)} .gbadge.d{background:var(--r50);color:var(--r600)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600}
.badge-g{background:var(--g50);color:var(--g800)} .badge-b{background:var(--b50);color:var(--b600)}
.badge-p{background:var(--p50);color:var(--p800)} .badge-a{background:var(--a50);color:var(--a600)}
.badge-c{background:var(--c50);color:var(--c600)} .badge-r{background:var(--r50);color:var(--r600)}
.badge-t{background:var(--t50);color:var(--t600)}

/* Progress bars */
.pbar{height:6px;border-radius:3px;background:var(--gr50);overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transform-origin:left;animation:barGrow 1s cubic-bezier(0.16,1,0.3,1) both}

/* Form elements */
input,select,textarea{font-family:'Sora',sans-serif;font-size:13px;color:var(--gr900)}
.finput{width:100%;padding:9px 13px;border:1.5px solid var(--gr100);border-radius:9px;outline:none;transition:border-color 0.15s;background:white}
.finput:focus{border-color:var(--g400);box-shadow:0 0 0 3px rgba(99,153,34,0.1)}
.finput-b:focus{border-color:var(--b400);box-shadow:0 0 0 3px rgba(55,138,221,0.1)}
.finput-p:focus{border-color:var(--p400);box-shadow:0 0 0 3px rgba(127,119,221,0.1)}
select.finput{cursor:pointer}
textarea.finput{resize:vertical;min-height:90px}

/* Modal overlay */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex;animation:fadeIn 0.2s}
.modal{background:white;border-radius:20px;padding:28px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;animation:popIn 0.3s cubic-bezier(0.34,1.3,0.64,1)}
.modal h3{font-family:'Fraunces',serif;font-size:20px;font-weight:700;margin-bottom:6px}
.modal-close{position:absolute;top:20px;right:20px;width:32px;height:32px;border-radius:50%;background:var(--gr50);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gr600);transition:all 0.15s}
.modal-close:hover{background:var(--r50);color:var(--r400)}
.modal{position:relative}

/* Toast */
#toast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
#toast svg{width:16px;height:16px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2}
#toast.success{background:var(--g800);color:white;animation:toastIn 0.3s forwards}
#toast.error{background:var(--r600);color:white;animation:toastIn 0.3s forwards}
#toast.info{background:var(--gr900);color:white;animation:toastIn 0.3s forwards}
#toast.out{animation:toastOut 0.3s forwards}
#toast.hidden{display:none}

/* Greeting banner */
.greeting{border-radius:18px;padding:24px 28px;margin-bottom:22px;position:relative;overflow:hidden}
.role-student .greeting{background:linear-gradient(120deg,var(--g800),var(--t600))}
.role-teacher .greeting{background:linear-gradient(120deg,var(--b800),var(--p600))}
.role-admin .greeting{background:linear-gradient(120deg,#2c1060,var(--p600))}
.role-parent .greeting{background:linear-gradient(120deg,var(--t600),var(--b600))}
.greeting::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.05)}
.greeting h2{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:white;animation:fadeUp 0.5s both}
.greeting p{font-size:13px;color:rgba(255,255,255,0.7);margin-top:4px;animation:fadeUp 0.5s 0.1s both}
.greeting-chips{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;animation:fadeUp 0.5s 0.2s both}
.gchip{background:rgba(255,255,255,0.15);color:white;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;backdrop-filter:blur(4px)}

/* Cal */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:14px 16px}
.cal-dlbl{text-align:center;font-size:10px;font-weight:700;color:var(--gr400);padding:4px 0;text-transform:uppercase}
.cal-d{text-align:center;padding:7px 0;border-radius:7px;font-size:12px;font-weight:500;color:var(--gr600);cursor:pointer;transition:all 0.15s}
.cal-d:hover{background:var(--g50)}
.cal-d.pres{background:var(--g100);color:var(--g800)}
.cal-d.abs{background:var(--r50);color:var(--r400)}
.cal-d.late{background:var(--a50);color:var(--a600)}
.cal-d.today{background:var(--g400);color:white;font-weight:700;box-shadow:0 2px 8px rgba(99,153,34,0.4)}
.cal-d.empty{cursor:default}

/* Scroll container for fee/att history */
.scroll-x{overflow-x:auto}
.scroll-x::-webkit-scrollbar{height:4px}
.scroll-x::-webkit-scrollbar-thumb{background:var(--gr100);border-radius:2px}

/* Event items */
.evitem{display:flex;align-items:flex-start;gap:10px;padding:10px 18px;border-bottom:1px solid rgba(0,0,0,0.04)}
.evitem:last-child{border-bottom:none}
.evdot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.evtitle{font-size:13px;font-weight:500;color:var(--gr800)}
.evtime{font-size:11px;color:var(--gr400);margin-top:1px}

/* Announcement card */
.acard{background:white;border-radius:12px;border:1px solid rgba(0,0,0,0.06);padding:18px 20px;transition:all 0.2s}
.acard:hover{box-shadow:0 4px 18px rgba(0,0,0,0.08);transform:translateY(-1px)}
.ameta{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.acat{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:0.04em}
.adate{font-size:12px;color:var(--gr400)}
.atitle{font-size:15px;font-weight:600;color:var(--gr900);margin-bottom:6px}
.abody{font-size:13px;color:var(--gr600);line-height:1.65}

/* Result input */
.marks-input{width:70px;padding:6px 9px;border:1.5px solid var(--gr100);border-radius:7px;font-family:'Sora',sans-serif;font-size:13px;text-align:center;outline:none;transition:all 0.2s}
.marks-input:focus{border-color:var(--b400);box-shadow:0 0 0 3px rgba(55,138,221,0.12)}

/* Notes */
.note-card{background:var(--a50);border:1px solid rgba(186,117,23,0.2);border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:all 0.2s;animation:fadeUp 0.3s both}
.note-card:hover{box-shadow:0 3px 14px rgba(186,117,23,0.1)}
.note-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.note-student{font-size:13px;font-weight:600;color:var(--a600)}
.note-date{font-size:11px;color:var(--a400)}
.note-text{font-size:13px;color:var(--gr700);line-height:1.6}
.note-del{background:none;border:none;cursor:pointer;color:var(--r400);font-size:16px;line-height:1;transition:transform 0.15s}
.note-del:hover{transform:scale(1.2)}

/* Attendance table cells */
.att-cell{padding:6px 8px;text-align:center;cursor:pointer;border-radius:6px;font-size:12px;font-weight:600;transition:all 0.15s;user-select:none}
.att-cell.p{background:var(--g50);color:var(--g600)}
.att-cell.a{background:var(--r50);color:var(--r400)}
.att-cell.l{background:var(--a50);color:var(--a600)}
.att-cell.h{background:var(--gr50);color:var(--gr400)}
.att-cell:hover{transform:scale(1.12)}

/* Admin overview card */
.overview-card{border-radius:14px;padding:20px;border:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;gap:14px}
.ov-icon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ov-icon svg{width:24px;height:24px;stroke:white;fill:none;stroke-width:2}
.ov-num{font-size:26px;font-weight:700;color:var(--gr900);font-family:'Fraunces',serif;line-height:1}
.ov-lbl{font-size:12px;color:var(--gr400);margin-top:2px}

/* Parent specific */
.child-card{border-radius:16px;padding:22px;margin-bottom:18px;cursor:pointer;border:2px solid transparent;transition:all 0.2s}
.child-card:hover{transform:translateY(-2px)}
.child-card.selected{border-color:var(--t400)}

/* Notification bar */
.notif-item{display:flex;align-items:flex-start;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(0,0,0,0.04);transition:background 0.15s}
.notif-item:hover{background:var(--gr50)}
.notif-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-icon svg{width:16px;height:16px;stroke:white;fill:none;stroke-width:2}
.notif-title{font-size:13px;font-weight:500;color:var(--gr800)}
.notif-time{font-size:11px;color:var(--gr400);margin-top:1px}
.notif-unread{background:var(--b50);border-left:3px solid var(--b400)}

/* Teacher schedule slot */
.period-slot{padding:10px 14px;border-radius:10px;margin-bottom:8px;border-left:3px solid transparent;transition:all 0.2s;cursor:default}
.period-slot:hover{transform:translateX(4px)}

/* Skeleton shimmer */
.skeleton{background:linear-gradient(90deg,var(--gr50) 25%,var(--gr100) 50%,var(--gr50) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite;border-radius:8px}

/* Chart bars */
.barchart{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{border-radius:4px 4px 0 0;width:100%;transform-origin:bottom;animation:barGrow 0.7s cubic-bezier(0.16,1,0.3,1) both;min-height:4px}
.barlbl{font-size:10px;color:var(--gr400);font-weight:500}
.barval{font-size:10px;font-weight:700;color:var(--gr600)}

/* Subject performance pill */
.sub-perf{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid rgba(0,0,0,0.04)}
.sub-name{font-size:13px;font-weight:500;color:var(--gr800);width:110px;flex-shrink:0}
.sub-bar-wrap{flex:1}
.sub-mark{font-size:13px;font-weight:700;color:var(--gr700);width:36px;text-align:right}

/* Fee status cards */
.fee-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.fee-mini{background:white;border-radius:13px;padding:18px;border:1px solid rgba(0,0,0,0.06)}
.fee-mini .fm-lbl{font-size:12px;color:var(--gr400);margin-bottom:6px}
.fee-mini .fm-amt{font-size:22px;font-weight:700;font-family:'Fraunces',serif;color:var(--gr900)}
.fee-mini .fm-status{font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;display:inline-block;margin-top:5px}

/* Teacher grading page */
.grade-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(0,0,0,0.04);transition:background 0.15s}
.grade-row:hover{background:var(--b50)}
.grade-row .st-name{font-size:13px;font-weight:500;color:var(--gr800);width:150px;flex-shrink:0}
.grade-row .st-avatar-sm{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;flex-shrink:0}

/* Admin student management */
.student-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(0,0,0,0.04);cursor:pointer;transition:background 0.15s}
.student-row:hover{background:var(--p50)}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--gr50);border-radius:10px;padding:4px;margin-bottom:18px}
.tab{padding:8px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;color:var(--gr600);border:none;background:none;font-family:'Sora',sans-serif}
.tab.active{background:white;color:var(--gr900);font-weight:600;box-shadow:0 1px 6px rgba(0,0,0,0.08)}
.tabpanel{display:none}
.tabpanel.active{display:block;animation:fadeUp 0.3s both}

/* Donut chart (CSS) */
.donut{width:90px;height:90px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.donut-text{font-size:18px;font-weight:700;font-family:'Fraunces',serif;color:var(--gr900)}
.donut-sub{font-size:10px;color:var(--gr400);text-align:center;margin-top:2px;line-height:1.3}

/* Profile page */
.profile-hero{background:white;border-radius:18px;border:1px solid rgba(0,0,0,0.06);padding:28px;display:flex;gap:22px;align-items:flex-start;margin-bottom:18px}
.pavatar{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:white;flex-shrink:0}
.pinfo h2{font-size:22px;font-weight:700;font-family:'Fraunces',serif;color:var(--gr900);margin-bottom:3px}
.pinfo p{font-size:13px;color:var(--gr400)}
.pchips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.pchip{background:var(--g50);color:var(--g800);border-radius:6px;font-size:12px;font-weight:500;padding:3px 9px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.isec{background:white;border-radius:14px;border:1px solid rgba(0,0,0,0.06);padding:18px}
.isec h4{font-size:11px;font-weight:700;color:var(--gr400);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
.irow{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.04)}
.irow:last-child{border-bottom:none}
.il{color:var(--gr400)}
.iv{color:var(--gr800);font-weight:500;text-align:right;max-width:58%}

/* Attendance rate circle */
.att-circle{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;font-family:'Fraunces',serif;border:4px solid}

/* ══ VAADWANI AI CHATBOT ══ */
@keyframes chatSlideUp{from{opacity:0;transform:translateY(24px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes chatSlideDown{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(24px) scale(0.96)}}
@keyframes typingDot{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
@keyframes chatFab{0%,100%{box-shadow:0 4px 24px rgba(99,153,34,0.4)}50%{box-shadow:0 8px 36px rgba(99,153,34,0.6)}}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes testPop{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
@keyframes scoreReveal{from{stroke-dashoffset:283}to{stroke-dashoffset:var(--sdash)}}
@keyframes suggBounce{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

/* FAB button */
#chatFab{
  position:fixed;bottom:28px;right:28px;z-index:8000;
  width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--g600),var(--t500,#1d9e75));
  box-shadow:0 4px 24px rgba(99,153,34,0.4);
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  animation:chatFab 3s ease-in-out infinite;
}
#chatFab:hover{transform:scale(1.1)}
#chatFab:active{transform:scale(0.95)}
#chatFab svg{width:26px;height:26px;fill:none;stroke:white;stroke-width:2;transition:all 0.2s}
.chat-fab-badge{
  position:absolute;top:-3px;right:-3px;
  width:20px;height:20px;border-radius:50%;
  background:var(--c400);color:white;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid white;animation:notifPop 0.4s both;
}

/* Chat window */
#chatWindow{
  position:fixed;bottom:96px;right:28px;z-index:7999;
  width:400px;height:580px;
  background:white;border-radius:22px;
  box-shadow:0 24px 72px rgba(0,0,0,0.2),0 4px 16px rgba(0,0,0,0.08);
  display:flex;flex-direction:column;overflow:hidden;
  animation:chatSlideUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
  border:1px solid rgba(0,0,0,0.07);
}
#chatWindow.closing{animation:chatSlideDown 0.25s ease forwards}
#chatWindow.hidden{display:none}

/* Chat header */
.chat-header{
  padding:16px 18px;display:flex;align-items:center;gap:11px;
  background:linear-gradient(120deg,var(--g800),var(--t600));
  flex-shrink:0;
}
.chat-header-icon{
  width:38px;height:38px;border-radius:11px;
  background:rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.chat-header-icon svg{width:20px;height:20px;fill:none;stroke:white;stroke-width:2}
.chat-header-info{flex:1}
.chat-header-info h4{font-size:14px;font-weight:700;color:white;font-family:'Fraunces',serif}
.chat-header-info p{font-size:11px;color:rgba(255,255,255,0.65);margin-top:1px}
.chat-header-badge{
  padding:3px 10px;border-radius:20px;
  background:rgba(255,255,255,0.15);
  font-size:10px;font-weight:600;color:rgba(255,255,255,0.9);
  display:flex;align-items:center;gap:5px;
}
.chat-header-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#4ade80}
.chat-close-btn{
  width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;
  background:rgba(255,255,255,0.12);color:white;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;font-size:16px;line-height:1;
}
.chat-close-btn:hover{background:rgba(255,255,255,0.22)}

/* Mode tabs */
.chat-mode-bar{
  display:flex;gap:0;background:var(--gr50);border-bottom:1px solid rgba(0,0,0,0.06);
  flex-shrink:0;
}
.chat-mode-tab{
  flex:1;padding:8px 4px;border:none;background:none;
  font-family:'Sora',sans-serif;font-size:11px;font-weight:600;
  color:var(--gr400);cursor:pointer;transition:all 0.2s;
  border-bottom:2px solid transparent;letter-spacing:0.02em;
}
.chat-mode-tab.active{color:var(--g600);border-bottom-color:var(--g400);background:rgba(99,153,34,0.04)}

/* Messages area */
.chat-messages{
  flex:1;overflow-y:auto;padding:14px 16px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--gr100);border-radius:2px}

/* Message bubbles */
.chat-msg{display:flex;gap:8px;animation:msgIn 0.28s ease both}
.chat-msg.user{flex-direction:row-reverse}
.msg-avatar{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:white;margin-top:2px;
}
.msg-avatar.ai{background:linear-gradient(135deg,var(--g400),var(--t400))}
.msg-bubble{
  max-width:78%;padding:10px 13px;border-radius:14px;
  font-size:13px;line-height:1.55;color:var(--gr900);
}
.chat-msg.ai .msg-bubble{background:var(--gr50);border-radius:4px 14px 14px 14px}
.chat-msg.user .msg-bubble{background:linear-gradient(135deg,var(--g700,#3b6d11),var(--g600));color:white;border-radius:14px 4px 14px 14px}
.msg-time{font-size:10px;color:var(--gr400);margin-top:3px;text-align:right}
.chat-msg.ai .msg-time{text-align:left}

/* Typing indicator */
.typing-indicator{display:flex;align-items:center;gap:4px;padding:10px 13px;background:var(--gr50);border-radius:4px 14px 14px 14px;width:fit-content}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--gr400)}
.typing-dot:nth-child(1){animation:typingDot 1.2s 0s infinite}
.typing-dot:nth-child(2){animation:typingDot 1.2s 0.2s infinite}
.typing-dot:nth-child(3){animation:typingDot 1.2s 0.4s infinite}

/* Suggestions chips */
.chat-suggestions{
  padding:8px 14px;display:flex;gap:6px;flex-wrap:wrap;
  border-top:1px solid var(--gr50);flex-shrink:0;
}
.sugg-chip{
  padding:5px 11px;border-radius:20px;border:1.5px solid var(--gr100);
  background:white;font-size:11px;font-weight:500;color:var(--gr700);
  cursor:pointer;transition:all 0.15s;white-space:nowrap;
  animation:suggBounce 0.3s ease both;
}
.sugg-chip:hover{border-color:var(--g400);color:var(--g600);background:var(--g50)}

/* Input area */
.chat-input-area{
  padding:12px 14px;border-top:1px solid rgba(0,0,0,0.06);
  display:flex;gap:8px;align-items:flex-end;flex-shrink:0;
}
#chatInput{
  flex:1;padding:9px 13px;border:1.5px solid var(--gr100);border-radius:12px;
  font-family:'Sora',sans-serif;font-size:13px;color:var(--gr900);
  outline:none;resize:none;max-height:80px;min-height:36px;line-height:1.4;
  transition:border-color 0.15s;background:#fafafa;
}
#chatInput:focus{border-color:var(--g400);background:white;box-shadow:0 0 0 3px rgba(99,153,34,0.08)}
.chat-send-btn{
  width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;flex-shrink:0;
  background:linear-gradient(135deg,var(--g600),var(--t600));
  display:flex;align-items:center;justify-content:center;
  transition:all 0.18s;
}
.chat-send-btn:hover{transform:scale(1.08);box-shadow:0 4px 14px rgba(59,109,17,0.3)}
.chat-send-btn:active{transform:scale(0.95)}
.chat-send-btn svg{width:16px;height:16px;fill:none;stroke:white;stroke-width:2}

/* ── MICRO-TEST UI ── */
.test-container{padding:4px 0;animation:testPop 0.35s cubic-bezier(0.16,1,0.3,1) both}
.test-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.test-header h5{font-size:13px;font-weight:700;color:var(--gr900)}
.test-subject-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;background:var(--g50);color:var(--g800)}
.test-progress{font-size:11px;color:var(--gr400)}
.test-q{font-size:13px;font-weight:500;color:var(--gr800);line-height:1.55;margin-bottom:10px}
.test-options{display:flex;flex-direction:column;gap:7px}
.test-opt{
  padding:9px 12px;border-radius:10px;border:1.5px solid var(--gr100);
  background:white;font-size:12px;font-weight:500;color:var(--gr800);
  cursor:pointer;transition:all 0.18s;text-align:left;font-family:'Sora',sans-serif;
}
.test-opt:hover{border-color:var(--g400);background:var(--g50);color:var(--g800)}
.test-opt.selected{border-color:var(--b400);background:var(--b50);color:var(--b600)}
.test-opt.correct{border-color:var(--g400);background:var(--g50);color:var(--g800)}
.test-opt.wrong{border-color:var(--r400);background:var(--r50);color:var(--r400)}
.test-explanation{
  margin-top:8px;padding:9px 12px;border-radius:9px;
  background:var(--g50);border-left:3px solid var(--g400);
  font-size:12px;color:var(--gr700);line-height:1.55;
}
.test-nav{display:flex;gap:7px;margin-top:10px;justify-content:flex-end}

/* Score circle */
.score-wrap{text-align:center;padding:8px 0}
.score-circle-svg{transform:rotate(-90deg)}
.score-circle-bg{fill:none;stroke:var(--gr50);stroke-width:8}
.score-circle-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:283;animation:scoreReveal 1.2s cubic-bezier(0.16,1,0.3,1) both}
.score-num{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--gr900);line-height:1}
.score-label{font-size:11px;color:var(--gr400);margin-top:3px}
.gap-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}

function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.className='';
  const icons={success:'<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',error:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',info:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'};
  el.innerHTML=icons[type]+msg;
  el.className=type;
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.className='hidden',300)},2800);
}

let activeChapterTest={chId:null,title:null,subject:null,questions:[],current:0,score:0,answers:[],answered:false};
function openChapterTest(chId,title,subject){
  const qs=CHAPTER_QUESTIONS[chId];
  if(!qs||!qs.length){toast('No questions available yet','info');return}
  activeChapterTest={chId,title,subject,questions:qs,current:0,score:0,answers:[],answered:false};
  showGenericModal(buildChapterTestHTML());
}
function buildChapterTestHTML(){
  const {questions,current,title,subject}=activeChapterTest;
  const q=questions[current];
  const progress=Math.round((current/questions.length)*100);
  const subColors={Mathematics:'var(--g400)',Physics:'var(--b400)',Chemistry:'var(--t400)',Biology:'var(--a400)',English:'var(--p400)','Social Science':'var(--c400)'};
  return`<div class="ctest-modal">
    <h3>${title}</h3>
    <p style="font-size:12px;color:var(--gr400);margin-bottom:12px">${subject} · Question ${current+1} of ${questions.length}</p>
    <div class="ctest-progress-bar"><div class="ctest-progress-fill" style="width:${progress}%"></div></div>
    <div class="ctest-q-num">Question ${current+1}/${questions.length}</div>
    <div class="ctest-question">${q.q}</div>
    <div class="ctest-opts">
      ${q.opts.map((opt,i)=>`<button class="ctest-opt" id="ctopt-${i}" onclick="selectChapterOpt(${i})">${String.fromCharCode(65+i)}. ${opt}</button>`).join('')}
    </div>
    <div class="ctest-nav" id="ctestNav" style="display:none">
      <button class="btn btn-ghost" style="font-size:12px" onclick="nextChapterQ()">
        ${current+1<questions.length?'Next Question →':'See Results'}
      </button>
    </div>
  </div>`;
}
function selectChapterOpt(i){
  if(activeChapterTest.answered)return;
  activeChapterTest.answered=true;
  const q=activeChapterTest.questions[activeChapterTest.current];
  activeChapterTest.answers.push(i);
  const correct=i===q.ans;
  if(correct)activeChapterTest.score++;
  document.querySelectorAll('.ctest-opt').forEach((el,idx)=>{
    el.disabled=true;
    if(idx===q.ans)el.classList.add('correct');
    else if(idx===i&&!correct)el.classList.add('wrong');
  });
  const nav=document.getElementById('ctestNav');
  if(nav){
    nav.style.display='flex';
    const expDiv=document.createElement('div');
    expDiv.className='ctest-exp';expDiv.innerHTML=(correct?'✅ ':'❌ ')+q.exp;
    nav.parentElement.insertBefore(expDiv,nav);
  }
}
function nextChapterQ(){
  const t=activeChapterTest;
  if(t.current+1<t.questions.length){
    t.current++;t.answered=false;
    document.getElementById('genericModalContent').innerHTML=buildChapterTestHTML();
  } else {
    // save result
    if(!studentTestResults[1])studentTestResults[1]={};
    const gaps=t.questions.filter((_,i)=>t.answers[i]!==t.questions[i].ans).map(q=>q.gap);
    studentTestResults[1][t.chId]={score:t.score,total:t.questions.length,gaps,answers:t.answers,takenAt:'3 Jun 2026'};
    // add to mistake notebook
    t.questions.forEach((q,i)=>{
      if(t.answers[i]!==q.ans){
        const key=t.chId+'_q'+i;
        if(!mistakeNotebook[1])mistakeNotebook[1]={};
        const existing=mistakeNotebook[1][key];
        mistakeNotebook[1][key]={count:(existing?existing.count:0)+1,question:q.q.slice(0,60),gap:q.gap,subject:t.subject,chapterId:t.chId,lastWrong:'3 Jun 2026'};
      }
    });
    const pct=Math.round(t.score/t.questions.length*100);
    const color=pct>=80?'var(--g400)':pct>=60?'var(--a400)':'var(--r400)';
    document.getElementById('genericModalContent').innerHTML=`
      <h3>Test Complete!</h3>
      <div class="score-wrap" style="margin:18px 0">
        <div style="font-size:48px;font-family:'Fraunces',serif;font-weight:700;color:${color}">${t.score}/${t.questions.length}</div>
        <div style="font-size:14px;color:var(--gr400);margin-top:4px">${pct}% — ${pct>=80?'Excellent!':pct>=60?'Good effort':'Needs review'}</div>
      </div>
      ${gaps.length?`<div class="gap-list"><div style="font-size:12px;font-weight:700;color:var(--a600);margin-bottom:6px">⚠ Gaps identified:</div>${gaps.map(g=>`<div class="gap-item">${g}</div>`).join('')}</div>`:'<div style="color:var(--g600);font-weight:600;text-align:center;padding:10px">🎉 Perfect score! No gaps found.</div>'}
      <button class="btn btn-g" style="width:100%;margin-top:18px" onclick="closeModal('genericModal');renderChapterTests()">Done</button>`;
    toast(`Test complete! ${t.score}/${t.questions.length} correct`,'success');
  }
}

// ── Test engine state ──
let activeTest={questions:[],current:0,score:0,answers:[],subject:'',active:false};

function startTest(subject){
  const qs=QUESTION_BANK[subject];
  if(!qs||!qs.length){appendMsg('ai','No test available for '+subject+' yet. Try Mathematics or Physics!');return;}
  activeTest={questions:qs.slice(0,5),current:0,score:0,answers:Array(5).fill(null),subject,active:true};
  chatMode='test';
  renderTestQuestion();
}

function renderTestQuestion(){
  const {questions,current,subject}=activeTest;
  if(current>=questions.length){renderTestResults();return;}
  const q=questions[current];
  const html=`<div class="test-container">
    <div class="test-header">
      <h5>Competency Check</h5>
      <span class="test-subject-badge">${subject}</span>
    </div>
    <div class="test-progress" style="margin-bottom:8px;font-size:11px;color:var(--gr400)">Question ${current+1} of ${questions.length}</div>
    <div class="pbar" style="margin-bottom:12px"><div class="pbar-fill" style="width:${((current)/questions.length*100)}%;background:var(--g400)"></div></div>
    <div class="test-q">${q.q}</div>
    <div class="test-options" id="testOpts">
      ${q.opts.map((o,i)=>`<button class="test-opt" onclick="selectOpt(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}
    </div>
    <div class="test-nav" id="testNav"></div>
  </div>`;
  const msgs=document.getElementById('chatMessages');
  const wrap=document.createElement('div');wrap.className='chat-msg ai';
  const av=document.createElement('div');av.className='msg-avatar ai';av.textContent='AI';
  const bub=document.createElement('div');bub.className='msg-bubble';bub.innerHTML=html;
  wrap.appendChild(av);wrap.appendChild(bub);
  msgs.innerHTML='';msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;
  document.getElementById('chatSuggestions').innerHTML='';
}

function selectOpt(idx){
  const {questions,current}=activeTest;
  const q=questions[current];
  const opts=document.querySelectorAll('.test-opt');
  opts.forEach(o=>o.disabled=true);
  opts[idx].classList.add(idx===q.ans?'correct':'wrong');
  if(idx===q.ans){opts[idx].classList.add('selected');activeTest.score++;}
  else{opts[idx].classList.add('wrong');opts[q.ans].classList.add('correct');}
  activeTest.answers[current]=idx;
  const expDiv=document.createElement('div');expDiv.className='test-explanation';
  expDiv.textContent='💡 '+q.exp;
  opts[opts.length-1].parentElement.appendChild(expDiv);
  // Next button
  const nav=document.getElementById('testNav');
  const btn=document.createElement('button');
  btn.className='btn btn-g';btn.style.cssText='font-size:12px;padding:7px 16px';
  btn.textContent=current<questions.length-1?'Next Question →':'See Results';
  btn.onclick=()=>{activeTest.current++;renderTestQuestion();};
  nav.appendChild(btn);
}

    ${gaps.length?`<div style="margin-top:10px;font-size:12px;font-weight:700;color:var(--gr500);text-transform:uppercase;letter-spacing:.06em">Learning gaps identified</div>
    <div class="gap-list">
      ${gaps.map(g=>`<div class="gap-item">❌ ${g.q.slice(0,60)}… — Revise this concept</div>`).join('')}
    </div>`:'<div class="gap-list"><div class="gap-item strong">✅ No gaps detected — great mastery!</div></div>'}
    <div class="test-nav" style="margin-top:12px">
      <button class="btn btn-ghost" style="font-size:12px;padding:7px 14px" onclick="startTest('${subject}')">Retake Test</button>
      <button class="btn btn-b" style="font-size:12px;padding:7px 14px" onclick="sendToTeacher(${JSON.stringify({subject,score,total:questions.length,gaps:gaps.map(g=>g.q.slice(0,50))})})">📤 Share with Teacher</button>
    </div>
  </div>`;
  const msgs=document.getElementById('chatMessages');
  const wrap=document.createElement('div');wrap.className='chat-msg ai';
  const av=document.createElement('div');av.className='msg-avatar ai';av.textContent='AI';
  const bub=document.createElement('div');bub.className='msg-bubble';bub.innerHTML=html;
  wrap.appendChild(av);wrap.appendChild(bub);
  msgs.innerHTML='';msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;
  activeTest.active=false;
  updateSuggestions();
}

function sendToTeacher(data){
  // Simulated: add a note to teacher's dashboard
  const note={sid:1,date:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}),type:'AI Test Result',text:`AI Competency Test — ${data.subject}: Scored ${data.score}/${data.total} (${Math.round(data.score/data.total*100)}%). ${data.gaps.length?'Learning gaps: '+data.gaps.join('; '):'No significant gaps detected.'}`};
  teacherNotes.unshift(note);
  toast('Test results shared with Ms. Priya Sharma 📤','success');
  setTimeout(()=>appendMsg('ai','✅ Your test results have been shared with Ms. Priya Sharma. She can see your learning gaps and will plan targeted practice for you in the next class!'),400);
}

// ── Insights mode ──
function renderInsights(){
  const role=currentRole;
  let html='';
  if(role==='Student'){
    const res=editableResults[1];
    const sorted=SUBJECTS.map(s=>({s,m:res[s]})).sort((a,b)=>a.m-b.m);
    const worst=sorted.slice(0,2),best=sorted.slice(-2);
    html=`<div class="test-container">
      <div class="test-header"><h5>Your Learning Insights</h5><span class="test-subject-badge">AI Analysis</span></div>
      <div style="font-size:12px;color:var(--gr500);margin-bottom:10px">Based on your assessment history &amp; current scores</div>
      <div style="font-size:12px;font-weight:700;color:var(--gr500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Areas to strengthen</div>
      <div class="gap-list">${worst.map(x=>`<div class="gap-item">⚠️ <strong>${x.s}</strong> — Current: ${x.m}/100. Focus on concept clarity.</div>`).join('')}</div>
      <div style="font-size:12px;font-weight:700;color:var(--gr500);text-transform:uppercase;letter-spacing:.06em;margin-top:12px;margin-bottom:6px">Your strengths</div>
      <div class="gap-list">${best.reverse().map(x=>`<div class="gap-item strong">✅ <strong>${x.s}</strong> — Current: ${x.m}/100. Great work!</div>`).join('')}</div>
      <div style="margin-top:12px"><button class="btn btn-g" style="font-size:12px;padding:7px 16px;width:100%" onclick="switchMode('test')">🎯 Take a Competency Test</button></div>
    </div>`;
  } else if(role==='Teacher'||role==='Admin'){
    const flagged=STUDENTS.filter(s=>parseFloat(avg(editableResults[s.id]))<65);
    const classAvg=(STUDENTS.map(s=>parseFloat(avg(editableResults[s.id]))).reduce((a,b)=>a+b,0)/STUDENTS.length).toFixed(1);
    html=`<div class="test-container">
      <div class="test-header"><h5>Class Insights</h5><span class="test-subject-badge">AI Analysis</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div style="text-align:center;background:var(--g50);border-radius:10px;padding:12px"><div style="font-size:22px;font-weight:700;font-family:'Fraunces',serif;color:var(--g600)">${classAvg}%</div><div style="font-size:11px;color:var(--gr400)">Class Average</div></div>
        <div style="text-align:center;background:var(--r50);border-radius:10px;padding:12px"><div style="font-size:22px;font-weight:700;font-family:'Fraunces',serif;color:var(--r400)">${flagged.length}</div><div style="font-size:11px;color:var(--gr400)">Need Attention</div></div>
      </div>
      <div style="font-size:12px;font-weight:700;color:var(--gr500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Students below threshold</div>
      <div class="gap-list">${flagged.map(s=>`<div class="gap-item">🚨 <strong>${s.name}</strong> — Avg: ${avg(editableResults[s.id])}%</div>`).join('')}</div>
      <div style="margin-top:12px"><button class="btn btn-b" style="font-size:12px;padding:7px 16px;width:100%" onclick="navTo('notes',null);toggleChat()">📝 Log Remediation Strategies</button></div>
    </div>`;
  } else if(role==='Parent'){
    const res=editableResults[1],a=avg(res);
    const sorted=SUBJECTS.map(s=>({s,m:res[s]})).sort((a,b)=>a.m-b.m);
    html=`<div class="test-container">
      <div class="test-header"><h5>Sparsh's Insights</h5><span class="test-subject-badge">AI Analysis</span></div>
      <div style="text-align:center;background:var(--b50);border-radius:10px;padding:12px;margin-bottom:12px"><div style="font-size:22px;font-weight:700;font-family:'Fraunces',serif;color:var(--b600)">${a}%</div><div style="font-size:11px;color:var(--gr400)">Current Average</div></div>
      <div style="font-size:12px;font-weight:700;color:var(--gr500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Suggested focus areas</div>
      <div class="gap-list">${sorted.slice(0,2).map(x=>`<div class="gap-item">⚠️ <strong>${x.s}</strong> — ${x.m}/100 — extra practice needed</div>`).join('')}</div>
      <div style="font-size:12px;font-weight:700;color:var(--gr500);text-transform:uppercase;letter-spacing:.06em;margin-top:10px;margin-bottom:6px">Strong subjects</div>
      <div class="gap-list">${sorted.slice(-1).map(x=>`<div class="gap-item strong">✅ <strong>${x.s}</strong> — ${x.m}/100</div>`).join('')}</div>
    </div>`;
  }
  const msgs=document.getElementById('chatMessages');
  const wrap=document.createElement('div');wrap.className='chat-msg ai';
  const av=document.createElement('div');av.className='msg-avatar ai';av.textContent='AI';
  const bub=document.createElement('div');bub.className='msg-bubble';bub.innerHTML=html;
  msgs.innerHTML='';msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;
}

// ── Message helpers ──
function appendMsg(type,html,delay=0){
  const msgs=document.getElementById('chatMessages');
  setTimeout(()=>{
    const wrap=document.createElement('div');wrap.className='chat-msg '+type;
    if(type==='ai'){
      const av=document.createElement('div');av.className='msg-avatar ai';av.textContent='AI';
      wrap.appendChild(av);
    }
    const bub=document.createElement('div');bub.className='msg-bubble';
    const time=document.createElement('div');time.className='msg-time';
    const now=new Date();time.textContent=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
    bub.innerHTML=html;bub.appendChild(time);
    wrap.appendChild(bub);
    msgs.appendChild(wrap);
    msgs.scrollTop=msgs.scrollHeight;
  },delay);
}

function showTyping(){
  const msgs=document.getElementById('chatMessages');
  const wrap=document.createElement('div');wrap.className='chat-msg ai';wrap.id='typingMsg';
  const av=document.createElement('div');av.className='msg-avatar ai';av.textContent='AI';
  const bub=document.createElement('div');bub.className='msg-bubble';
  bub.innerHTML='<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  wrap.appendChild(av);wrap.appendChild(bub);msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typingMsg');if(t)t.remove();}

function sendChatMessage(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();if(!msg)return;
  input.value='';autoResize(input);
  appendMsg('user',msg);
  document.getElementById('chatSuggestions').innerHTML='';
  showTyping();
  const delay=600+Math.random()*600;
  setTimeout(()=>{
    hideTyping();
    const resp=buildAIResponse(msg);
    appendMsg('ai',resp);
    updateSuggestions();
  },delay);
}

function chatKeydown(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChatMessage();}
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,80)+'px';}

function updateSuggestions(){
  const suggs=(SUGGESTIONS[currentRole]||SUGGESTIONS.Student)[chatMode]||[];
  const container=document.getElementById('chatSuggestions');
  container.innerHTML=suggs.map((s,i)=>`<div class="sugg-chip" style="animation-delay:${i*0.05}s" onclick="useSuggestion(this,'${s.replace(/'/g,"\\'")}')">  ${s}</div>`).join('');
}

function useSuggestion(el,text){
  document.getElementById('chatInput').value=text;
  el.style.opacity='0.5';
  sendChatMessage();
}

// ── Mode switcher ──
function switchMode(mode){
  chatMode=mode;
  document.querySelectorAll('.chat-mode-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('mode'+mode.charAt(0).toUpperCase()+mode.slice(1)).classList.add('active');
  const msgs=document.getElementById('chatMessages');
  msgs.innerHTML='';
  if(mode==='chat'){
    appendMsg('ai',getChatWelcome());
    updateSuggestions();
  } else if(mode==='test'){
    renderTestSelect();
  } else if(mode==='insights'){
    renderInsights();
    updateSuggestions();
  }
}

function getChatWelcome(){
  const welcomes={
    Student:"Hi! I can help you with tomorrow's schedule, pending assignments, subject explanations, or anything else. What would you like to know? 📚",
    Teacher:"Hello! Ask me about your schedule, free periods, which students need attention, or class performance data. 👩‍🏫",
    Admin:"Welcome! I can provide school-wide analytics, enrollment data, fee collection status, and attendance summaries. 🏫",
    Parent:"Hello! I can help you track your child's assignments, upcoming events, academic progress, and teacher feedback. 👨‍👩‍👧",
  };
  return welcomes[currentRole]||"How can I help you today?";
}

function renderTestSelect(){
  const available=Object.keys(QUESTION_BANK).filter(s=>QUESTION_BANK[s]&&QUESTION_BANK[s].length);
  const html=`<div class="test-container">
    <div class="test-header"><h5>Competency-Based Tests</h5><span class="test-subject-badge">Select Subject</span></div>
    <p style="font-size:12px;color:var(--gr500);margin-bottom:12px;line-height:1.55">These tests focus on understanding and application — not rote learning. Select a subject to begin a short 5-question competency check.</p>
    <div style="display:flex;flex-direction:column;gap:7px">
      ${available.map(s=>`<button class="test-opt" onclick="startTest('${s}')" style="text-align:left;padding:10px 14px">📖 <strong>${s}</strong></button>`).join('')}
    </div>
  </div>`;
  const msgs=document.getElementById('chatMessages');
  const wrap=document.createElement('div');wrap.className='chat-msg ai';
  const av=document.createElement('div');av.className='msg-avatar ai';av.textContent='AI';
  const bub=document.createElement('div');bub.className='msg-bubble';bub.innerHTML=html;
  wrap.appendChild(av);wrap.appendChild(bub);msgs.innerHTML='';msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;
}

// ── Open/close ──
function toggleChat(){
  const win=document.getElementById('chatWindow');
  const fab=document.getElementById('chatFab');
  const badge=document.getElementById('chatFabBadge');
  if(chatOpen){
    win.classList.add('closing');
    setTimeout(()=>{win.classList.add('hidden');win.classList.remove('closing');},240);
    fab.querySelector('svg').innerHTML='<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>';
    chatOpen=false;
  } else {
    win.classList.remove('hidden');
    chatOpen=true;
    // Change FAB icon to X
    fab.querySelector('svg').innerHTML='<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
    badge.style.display='none';
    // Init if first open
    const msgs=document.getElementById('chatMessages');
    if(!msgs.innerHTML.trim()){
      // Role-specific mode tabs
      const modetabs=document.getElementById('chatModebar');
      if(currentRole==='Teacher'||currentRole==='Admin'){
        document.getElementById('modeTest').style.display='none';
      }
      // Welcome
      appendMsg('ai',getChatWelcome());
      updateSuggestions();
      // Update subtitle
      const subtitles={Student:'Student Assistant · Class X-A',Teacher:'Teacher Assistant · Class X-A',Admin:'Admin Assistant · Greenwood Academy',Parent:'Parent Portal · Sparsh Jain'};
      document.getElementById('chatSubtitle').textContent=subtitles[currentRole]||'School Assistant';
    }
  }
}

// Show FAB when logged in
const origSetupApp=setupApp;
setupApp=function(){
  origSetupApp();
  document.getElementById('chatFab').style.display='flex';
  // Reset chat on new login
  document.getElementById('chatMessages').innerHTML='';
  chatOpen=false;
  chatMode='chat';
  const win=document.getElementById('chatWindow');
  win.classList.add('hidden');
  win.classList.remove('closing');
  document.getElementById('chatFab').querySelector('svg').innerHTML='<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>';
  document.getElementById('chatFabBadge').style.display='flex';
};
const origDoLogout=doLogout;
doLogout=function(){
  origDoLogout();
  document.getElementById('chatFab').style.display='none';
  chatOpen=false;
};
</script>
